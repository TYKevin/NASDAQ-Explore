<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:#0b1220; color:#e5e7eb; font-family:-apple-system;">
<div style="padding:16px; max-width:980px; margin:0 auto;">

  <!-- Title -->
  <div style="font-size:13px; opacity:0.75; letter-spacing:0.10em;">
    QQQ DRAWDOWN DASHBOARD
  </div>

  <!-- Top section -->
  <div style="
    margin-top:10px;
    display:flex;
    align-items:stretch;
    gap:16px;
    flex-wrap:wrap;
  ">

    <!-- LEFT: 52W Card -->
    <div style="
      flex:1 1 0;
      padding:16px 18px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:12px;
    ">

      <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px;">
        <div style="font-size:14px; opacity:0.7; white-space:nowrap;">52W High</div>
        <div style="
          min-width:120px;
          font-weight:900;
          font-size:20px;
          text-align:left;
          white-space:nowrap;
        ">
          highFmt
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px;">
        <div style="font-size:14px; opacity:0.7; white-space:nowrap;">Current</div>
        <div style="
          min-width:120px;
          font-weight:900;
          font-size:20px;
          text-align:left;
          white-space:nowrap;
        ">
          nowFmt
        </div>
      </div>

    </div>

    <!-- RIGHT: pct + Zone -->
    <div style="
      flex:1 1 0;
      padding:16px 18px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-end;
      gap:12px;
      text-align:right;
    ">

      <div style="
        font-size:44px;
        font-weight:900;
        line-height:1;
        color:color;
      ">
        pctDisplay%
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:18px;">zoneBadge</span>
        <span style="font-weight:800; font-size:18px; color:zoneColor;">
          zoneText
        </span>
      </div>

    </div>

  </div>

  <!-- Progress -->
  <div style="
    margin-top:16px;
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  ">

    <div style="position:relative; height:14px; font-size:12px; opacity:0.8;">
      <div style="position:absolute; left:0%;">0%</div>
      <div style="position:absolute; left:25%; transform:translateX(-50%);">10%</div>
      <div style="position:absolute; left:50%; transform:translateX(-50%);">20%</div>
      <div style="position:absolute; left:75%; transform:translateX(-50%);">30%</div>
      <div style="position:absolute; left:100%; transform:translateX(-100%);">100%</div>
    </div>

    <div style="margin-top:6px; height:12px; border-radius:999px; overflow:hidden; display:flex; background:rgba(255,255,255,0.10);">
      <div style="width:25%; background:rgba(34,197,94,0.15);"></div>
      <div style="width:25%; background:rgba(234,179,8,0.15);"></div>
      <div style="width:25%; background:rgba(249,115,22,0.15);"></div>
      <div style="width:25%; background:rgba(239,68,68,0.12);"></div>
    </div>

    <div style="margin-top:-12px; height:12px; border-radius:999px; overflow:hidden;">
      <div style="height:12px; width:barWidth%; background:zoneColor;"></div>
    </div>

  </div>

</div>
</body>
</html>
